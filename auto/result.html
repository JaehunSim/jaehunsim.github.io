
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greeting Card</title>
    <style>
        :root {
            --primary-color: #6366f1;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            color: #333;
        }

        .card {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 1rem;
            font-size: 2.5rem;
        }

        p {
            line-height: 1.6;
            color: #666;
            margin-bottom: 2rem;
        }

        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .emoji {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }

        #message {
            margin-top: 1.5rem;
            font-weight: bold;
            color: #444;
            min-height: 1.5em;
        }
    </style>
</head>
<body>

    <div class="card">
        <span class="emoji">👋</span>
        <h1>Hello!</h1>
        <p>I am your helpful assistant. I can respond using HTML to provide a richer, more interactive experience.</p>
        
        <button class="btn" onclick="sayHello()">Click for a surprise</button>
        
        <div id="message"></div>
    </div>

    <script>
        function sayHello() {
            const messages = [
                "Hope you're having a great day! 🌟",
                "How can I help you today? 🚀",
                "Ready to create something amazing? 🎨",
                "The code is strong with this one! 💻",
                "Keep being awesome! ✨"
            ];
            const randomMessage = messages[Math.floor(Math.random() * messages.length)];
            document.getElementById('message').innerText = randomMessage;
        }
    </script>
</body>
</html>
