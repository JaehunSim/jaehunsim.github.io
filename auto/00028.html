  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

    tailwind.config = {

<body class="bg-gray-50 text-gray-900 font-sans">

  <div class="max-w-6xl mx-auto px-4 py-12" x-data="priceChartApp()">
    <header class="mb-12 text-center">
      <h1 class="text-4xl font-extrabold text-gray-900 mb-4">House Price Trends</h1>
      <p class="text-lg text-gray-600">Interactive visualization of home prices over time in the Silicon Valley
        area.</p>
    </header>

    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 mb-8">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
        <!-- City Selection -->
        <div>
          <label for="city" class="block text-sm font-medium text-gray-700 mb-2">Select City</label>
          <select id="city" x-model="selectedCity" @change="updateChart()"
            class="w-full p-2.5 bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-brand focus:border-brand block">
            <template x-for="city in cities" :key="city">
              <option :value="city" x-text="city.replace('_', ' ')"></option>
            </template>
          </select>
        </div>

        <!-- Percentile Selection -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Select Metrics</label>
          <div class="flex flex-wrap gap-4">
            <label class="inline-flex items-center cursor-pointer">
              <input type="checkbox" x-model="metrics.P50" @change="updateChart()"
                class="w-4 h-4 text-brand bg-gray-100 border-gray-300 rounded focus:ring-brand">
              <span class="ml-2 text-sm text-gray-600">Median (P50)</span>
            </label>
            <label class="inline-flex items-center cursor-pointer">
              <input type="checkbox" x-model="metrics.P95" @change="updateChart()"
                class="w-4 h-4 text-brand bg-gray-100 border-gray-300 rounded focus:ring-brand">
              <span class="ml-2 text-sm text-gray-600">High End (P95)</span>
            </label>
            <label class="inline-flex items-center cursor-pointer">
              <input type="checkbox" x-model="metrics.P99" @change="updateChart()"
                class="w-4 h-4 text-brand bg-gray-100 border-gray-300 rounded focus:ring-brand">
              <span class="ml-2 text-sm text-gray-600">Luxury (P99)</span>
            </label>
          </div>
        </div>
      </div>

      <div class="relative h-[500px] w-full">
        <canvas id="priceChart"></canvas>
      </div>
    </div>

    <footer class="text-center text-gray-500 text-sm">
      Data source: house_prices.js
    </footer>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script>
    function priceChartApp() {
      let chartInstance = null; // Use a closure variable to avoid Alpine reactivity loops

      return {
        selectedCity: 'Palo_Alto',
        metrics: {
          P50: true,
          P95: false,
          P99: false
        },
        cities: Object.keys(housePrices),

        init() {
          this.initChart();
          this.updateChart();
        },

        initChart() {
          const ctx = document.getElementById('priceChart').getContext('2d');
          chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
              labels: [],
              datasets: []
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              interaction: {
                mode: 'index',
                intersect: false,
              },
              plugins: {
                legend: {
                  position: 'top',
                  labels: {
                    usePointStyle: true,
                    padding: 20
                  }
                },
                tooltip: {
                  callbacks: {
                    label: function (context) {
                      let label = context.dataset.label || '';
                      if (label) {
                        label += ': ';
                      }
                      if (context.parsed.y !== null) {
                        label += new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(context.parsed.y);
                      }
                      return label;
                    }
                  }
                }
              },
              scales: {
                x: {
                  grid: {
                    display: false
                  }
                },
                y: {
                  type: 'logarithmic',
                  beginAtZero: false,
                  ticks: {
                    callback: function (value) {
                      return new Intl.NumberFormat('en-US', {
                        style: 'currency',
                        currency: 'USD',
                        notation: 'compact',
                        maximumFractionDigits: 1
                      }).format(value);
                    }
                  }
                }
              }
            }
          });
        },

        updateChart() {
          const data = housePrices[this.selectedCity];
          const labels = data.map(d => d.year);

          const datasets = [];

          if (this.metrics.P50) {
            datasets.push({
              label: 'Median (P50)',
              data: data.map(d => d.P50),
              borderColor: '#1a56db',
              backgroundColor: '#1a56db',
              borderWidth: 3,
              tension: 0.3,
              pointRadius: 0,
              pointHoverRadius: 5
            });
          }

          if (this.metrics.P95) {
            datasets.push({
              label: 'High End (P95)',
              data: data.map(d => d.P95),
              borderColor: '#ef4444',
              backgroundColor: '#ef4444',
              borderWidth: 3,
              tension: 0.3,
              pointRadius: 0,
              pointHoverRadius: 5
            });
          }

          if (this.metrics.P99) {
            datasets.push({
              label: 'Luxury (P99)',
              data: data.map(d => d.P99),
              borderColor: '#10b981',
              backgroundColor: '#10b981',
              borderWidth: 3,
              tension: 0.3,
              pointRadius: 0,
              pointHoverRadius: 5
            });
          }

          chartInstance.data.labels = labels;
          chartInstance.data.datasets = datasets;
          chartInstance.update();
        }
      }
    }
